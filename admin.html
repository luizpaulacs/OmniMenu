<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Painel OmniMenu · Admin</title>
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <!-- Ícones (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f4f6fb;
            color: #1e293b;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .main-container {
            max-width: 1200px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08), 0 4px 18px rgba(0, 0, 0, 0.02);
        }
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            gap: 12px;
            border-bottom: 1px solid #e9edf4;
            padding-bottom: 16px;
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #0f172a;
        }
        header h1 i { color: #3b82f6; font-size: 1.8rem; }
        #txt-nome-loja {
            font-weight: 500;
            background: #eef2ff;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 1rem;
            color: #2563eb;
        }

        /* Abas */
        .abas-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid #e9edf4;
            padding-bottom: 12px;
        }
        .aba-btn {
            background: transparent;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 40px;
            cursor: pointer;
            color: #475569;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .aba-btn i { font-size: 1rem; opacity: 0.7; }
        .aba-btn:hover { background: #f1f5f9; color: #0f172a; }
        .aba-btn.ativa {
            background: #1e293b;
            color: white;
            box-shadow: 0 4px 10px rgba(30, 41, 59, 0.15);
        }
        .aba-btn.ativa i { opacity: 1; color: #94a3b8; }

        /* Conteúdo das abas */
        .aba-conteudo {
            display: none;
            animation: fade 0.2s ease;
        }
        .aba-conteudo.ativa { display: block; }
        @keyframes fade { from { opacity: 0.6; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .aba-conteudo h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 22px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .aba-conteudo h2 i { color: #3b82f6; }

        /* Cards e campos */
        .campo { margin-bottom: 18px; }
        .campo label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #334155;
        }
        .campo input, .campo textarea, .campo select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #fafcff;
            transition: 0.2s;
            font-family: inherit;
        }
        .campo input:focus, .campo textarea:focus, .campo select:focus {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
            border-color: transparent;
            background: white;
        }
        .campo textarea { min-height: 80px; resize: vertical; }
        .btn-salvar {
            background: #1e293b;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        .btn-salvar:hover { background: #0f172a; transform: scale(1.01); }
        .btn-salvar:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

        .box-variacao-input {
            background: #f8fafc;
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px dashed #cbd5e1;
            margin-bottom: 18px;
            display: none;
        }

        /* Pedidos */
        .pedido-card {
            border-left: 6px solid #facc15;
            background: #f8fafc;
            border-radius: 20px;
            padding: 18px 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            transition: 0.2s;
        }
        .pedido-card:hover { background: #ffffff; box-shadow: 0 8px 18px -8px rgba(0,0,0,0.08); }
        .pedido-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 6px;
        }
        .pedido-itens {
            font-size: 0.9rem;
            color: #475569;
            margin: 10px 0;
            border-top: 1px dashed #e2e8f0;
            border-bottom: 1px dashed #e2e8f0;
            padding: 10px 0;
        }
        .status-Pendente { border-left-color: #facc15; }
        .status-Em-preparo { border-left-color: #3b82f6; }
        .status-Em-entrega { border-left-color: #f97316; }
        .status-Concluido { border-left-color: #22c55e; opacity: 0.75; }
        .pedido-card select {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 6px;
            cursor: pointer;
        }

        /* Lista de preços */
        .item-reajuste {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 14px 12px;
            border-bottom: 1px solid #edf2f7;
            gap: 10px;
        }
        .item-reajuste:last-child { border-bottom: none; }
        .item-reajuste strong { font-weight: 500; }
        .input-preco-edit {
            width: 90px;
            padding: 8px 6px;
            text-align: center;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            font-weight: 500;
            background: white;
        }
        .btn-update-preco {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            transition: 0.15s;
        }
        .btn-update-preco:hover { background: #2563eb; }
        .btn-update-preco.verde { background: #22c55e; }
        .btn-update-preco.verde:hover { background: #16a34a; }
        .btn-update-preco.vermelho { background: #ef4444; }
        .btn-update-preco.vermelho:hover { background: #dc2626; }

        /* Tabela clientes */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th {
            background: #f1f5f9;
            color: #1e293b;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            border-radius: 16px 16px 0 0;
        }
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #eef2f6;
        }
        .badge-pontos {
            background: #dbeafe;
            color: #1e4c8c;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .fidelidade-regra {
            background: #f1f5f9;
            padding: 16px 18px;
            border-radius: 24px;
            margin-bottom: 28px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
        }
        .fidelidade-regra label { font-weight: 500; margin-right: 6px; }
        .fidelidade-regra input {
            width: 100px;
            padding: 8px 10px;
            border-radius: 30px;
            border: 1px solid #d1d9e6;
            text-align: center;
            font-weight: 500;
        }
        @media (max-width: 500px) { .fidelidade-regra { flex-direction: column; align-items: stretch; } }

        /* responsividade extra */
        @media (max-width: 640px) {
            .main-container { padding: 16px 12px; border-radius: 24px; }
            header h1 { font-size: 1.3rem; }
            .aba-btn { padding: 8px 14px; font-size: 0.85rem; }
        }
        /* ícones em tabelas */
        .icone-acao { margin-right: 6px; }
        .texto-secundario { color: #64748b; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="main-container" id="conteudo-painel-admin">
    <header>
        <h1><i class="fas fa-utensils"></i> OmniMenu <span id="txt-nome-loja" style="font-size:1rem; margin-left: 8px;">Carregando...</span></h1>
        <span style="background:#eef2ff; padding:6px 16px; border-radius:40px; font-size:0.85rem; font-weight:500; color:#2563eb;"><i class="fas fa-store"></i> Admin</span>
    </header>

    <div class="abas-menu">
        <button class="aba-btn ativa" onclick="mudarAba('aba-pedidos', this)"><i class="fas fa-clipboard-list"></i> Pedidos</button>
        <button class="aba-btn" onclick="mudarAba('aba-cadastro', this)"><i class="fas fa-plus-circle"></i> Cadastrar</button>
        <button class="aba-btn" onclick="mudarAba('aba-cardapio-edit', this)"><i class="fas fa-tags"></i> Preços</button>
        <button class="aba-btn" onclick="mudarAba('aba-fidelidade', this)"><i class="fas fa-star"></i> Fidelidade</button>
    </div>

    <!-- ABA PEDIDOS -->
    <div id="aba-pedidos" class="aba-conteudo ativa">
        <h2><i class="fas fa-truck"></i> Fila de pedidos</h2>
        <div id="lista-pedidos-admin" style="margin-top:8px;">Carregando pedidos...</div>
    </div>

    <!-- ABA CADASTRO -->
    <div id="aba-cadastro" class="aba-conteudo">
        <h2><i class="fas fa-egg"></i> Novo item</h2>
        <form id="form-produto" onsubmit="cadastrarProduto(event)">
            <div class="campo"><label><i class="fas fa-tag"></i> Nome do produto</label><input type="text" id="prod-nome" required placeholder="Ex: Pizza Marguerita"></div>
            <div class="grid-2">
                <div class="campo"><label><i class="fas fa-folder"></i> Categoria</label><input type="text" id="prod-categoria" required placeholder="Ex: Pizzas, Bebidas"></div>
                <div class="campo" id="campo-preco-base"><label><i class="fas fa-dollar-sign"></i> Preço padrão (R$)</label><input type="number" id="prod-preco" step="0.01" placeholder="0.00"></div>
            </div>
            <div class="campo" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <input type="checkbox" id="prod-tem-var" onchange="toggleVariacoes()" style="width:auto; height:20px; width:20px;">
                <label for="prod-tem-var" style="margin:0; font-weight:400;">Este item tem variações (tamanhos)?</label>
            </div>
            <div class="box-variacao-input" id="box-variacoes">
                <label style="font-weight:500; display:block; margin-bottom:4px;">Variações (nome:preço, ex: Pequena:25.00, Grande:45.00)</label>
                <input type="text" id="prod-variacoes-string" placeholder="Pequena:25.00, Média:35.00, Grande:45.00">
            </div>
            <div class="campo"><label><i class="fas fa-align-left"></i> Descrição</label><textarea id="prod-desc" rows="3" required placeholder="Ingredientes, modo de preparo..."></textarea></div>
            <div class="campo"><label><i class="fas fa-image"></i> Imagem</label><input type="file" id="prod-img" accept="image/*" required></div>
            <button type="submit" id="btn-submit-admin" class="btn-salvar"><i class="fas fa-cloud-upload-alt"></i> Publicar item</button>
        </form>
    </div>

    <!-- ABA PREÇOS -->
    <div id="aba-cardapio-edit" class="aba-conteudo">
        <h2><i class="fas fa-edit"></i> Ajuste rápido de preços</h2>
        <div id="lista-reajuste-itens" style="background:#fafcff; border-radius:24px; padding:6px 0;">Carregando...</div>
    </div>

    <!-- ABA FIDELIDADE -->
    <div id="aba-fidelidade" class="aba-conteudo">
        <h2><i class="fas fa-crown"></i> Clientes & regras</h2>
        <div class="fidelidade-regra">
            <div><i class="fas fa-coins" style="color:#f59e0b;"></i> <strong>Regra de pontuação</strong></div>
            <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
                <span>A cada R$</span>
                <input type="number" id="config-valor-ponto" value="10.00" step="0.01">
                <span>em compras → 1 ponto</span>
                <button onclick="salvarRegraFidelidade()" class="btn-update-preco verde" style="padding:8px 20px;"><i class="fas fa-save"></i> Salvar</button>
            </div>
        </div>

        <table>
            <thead><tr><th><i class="fas fa-user"></i> Cliente</th><th><i class="fab fa-whatsapp"></i> WhatsApp</th><th><i class="fas fa-star"></i> Pontos</th><th><i class="fas fa-gift"></i> Resgatar</th></tr></thead>
            <tbody id="tabela-clientes-fidelidade">
                <tr><td colspan="4" class="texto-secundario" style="text-align:center; padding:28px;">Nenhum cliente registrado ainda.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyAC3ep1kk4zxKkVH1jXHqWV9r2use_HWfo",
        authDomain: "omnimenu-d2875.firebaseapp.com",
        projectId: "omnimenu-d2875",
        storageBucket: "omnimenu-d2875.firebasestorage.app",
        messagingSenderId: "628204265903",
        appId: "1:628204265903:web:379db009ca38289bd6cf5a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    const urlParams = new URLSearchParams(window.location.search);
    const idLojaAtual = urlParams.get('loja');

    if (!idLojaAtual) {
        document.getElementById("conteudo-painel-admin").innerHTML = `<div style="padding:40px;text-align:center;"><i class="fas fa-exclamation-triangle" style="font-size:2rem;color:#ef4444;"></i><h2>Link de admin inválido</h2><p>Falta o parâmetro ?loja=xxx</p></div>`;
        throw new Error("ID da loja não fornecido");
    }

    // Carrega dados da loja
    db.collection("empresas").doc(idLojaAtual).get().then((doc) => {
        if (doc.exists) {
            document.getElementById("txt-nome-loja").innerText = doc.data().nomeNegocio || "Loja";
            if (doc.data().valorPorPonto) {
                document.getElementById("config-valor-ponto").value = doc.data().valorPorPonto;
            }
            inicializarEscutadoresPedidos();
            escutarProdutosParaReajuste();
            escutarClientesFidelidade();
        } else {
            alert("Loja não encontrada.");
        }
    });

    // ========== FUNÇÕES GLOBAIS ==========
    function salvarRegraFidelidade() {
        const valor = parseFloat(document.getElementById("config-valor-ponto").value);
        if (isNaN(valor) || valor <= 0) { alert("Digite um valor válido (ex: 10.00)"); return; }
        db.collection("empresas").doc(idLojaAtual).update({ valorPorPonto: valor })
            .then(() => alert("✅ Regra salva!"))
            .catch(() => alert("Erro ao salvar."));
    }

    function toggleVariacoes() {
        const check = document.getElementById("prod-tem-var").checked;
        document.getElementById("box-variacoes").style.display = check ? "block" : "none";
        document.getElementById("prod-preco").required = !check;
    }

    function escutarClientesFidelidade() {
        db.collection("empresas").doc(idLojaAtual).collection("clientes").orderBy("nome").onSnapshot((snapshot) => {
            const tbody = document.getElementById("tabela-clientes-fidelidade");
            tbody.innerHTML = "";
            if (snapshot.empty) {
                tbody.innerHTML = `<tr><td colspan="4" class="texto-secundario" style="text-align:center; padding:28px;">Nenhum cliente encontrado.</td></tr>`;
                return;
            }
            snapshot.forEach(doc => {
                const c = doc.data();
                const idCliente = doc.id;
                const pontos = c.pontosFidelidade || 0;
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${c.nome || '—'}</strong></td>
                        <td>${c.whatsapp || '—'}</td>
                        <td><span class="badge-pontos"><i class="fas fa-star" style="color:#f59e0b;"></i> ${pontos} pts</span></td>
                        <td>
                            <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
                                <input type="number" id="pts-sub-${idCliente}" value="10" style="width:70px; padding:6px; border-radius:30px; border:1px solid #e2e8f0; text-align:center;">
                                <button class="btn-update-preco vermelho" onclick="resgatarPontosCliente('${idCliente}', ${pontos})"><i class="fas fa-minus-circle"></i> Debitar</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        });
    }

    function resgatarPontosCliente(whatsCliente, pontosAtuais) {
        const qtd = parseInt(document.getElementById(`pts-sub-${whatsCliente}`).value);
        if (isNaN(qtd) || qtd <= 0) { alert("Quantidade inválida."); return; }
        if (qtd > pontosAtuais) { alert("Pontos insuficientes."); return; }
        if (confirm(`Descontar ${qtd} pontos de ${whatsCliente}?`)) {
            db.collection("empresas").doc(idLojaAtual).collection("clientes").doc(whatsCliente).update({
                pontosFidelidade: pontosAtuais - qtd
            }).then(() => alert("✅ Pontos debitados."));
        }
    }

    function cadastrarProduto(event) {
        event.preventDefault();
        const btn = document.getElementById('btn-submit-admin');
        const arquivo = document.getElementById('prod-img').files[0];
        const nome = document.getElementById('prod-nome').value.trim();
        const desc = document.getElementById('prod-desc').value.trim();
        const categoria = document.getElementById('prod-categoria').value.trim();
        const temVar = document.getElementById('prod-tem-var').checked;
        let precoBase = parseFloat(document.getElementById('prod-preco').value) || 0;
        let variacoes = [];

        if (temVar) {
            try {
                const raw = document.getElementById('prod-variacoes-string').value;
                raw.split(',').forEach(item => {
                    const partes = item.split(':');
                    if (partes.length === 2) {
                        variacoes.push({ nome: partes[0].trim(), preco: parseFloat(partes[1].trim()) });
                    }
                });
                if (variacoes.length === 0) { alert("Informe pelo menos uma variação válida."); return; }
            } catch(e) { alert("Erro no formato das variações."); return; }
        }

        if (!arquivo) { alert("Selecione uma imagem."); return; }

        btn.innerText = "⏳ Enviando..."; btn.disabled = true;
        const refStorage = storage.ref().child('produtos/' + Date.now() + "_" + arquivo.name);
        refStorage.put(arquivo).then(snap => snap.ref.getDownloadURL())
            .then(urlImagem => {
                return db.collection("empresas").doc(idLojaAtual).collection("produtos").add({
                    nome, desc, preco: precoBase, categoria,
                    temVariacoes: temVar, variacoes: variacoes,
                    imagemUrl: urlImagem,
                    dataCriacao: firebase.firestore.FieldValue.serverTimestamp()
                });
            })
            .then(() => {
                alert("✅ Produto publicado!");
                document.getElementById('form-produto').reset();
                document.getElementById("box-variacoes").style.display = "none";
            })
            .catch(err => alert("Erro: " + err.message))
            .finally(() => { btn.innerText = "🚀 Publicar item"; btn.disabled = false; });
    }

    function escutarProdutosParaReajuste() {
        db.collection("empresas").doc(idLojaAtual).collection("produtos").orderBy("categoria").onSnapshot((snapshot) => {
            const container = document.getElementById("lista-reajuste-itens");
            container.innerHTML = "";
            if (snapshot.empty) { container.innerHTML = "<p style='padding:20px;color:#64748b;'>Nenhum produto cadastrado.</p>"; return; }

            snapshot.forEach((doc) => {
                const prod = doc.data();
                const id = doc.id;
                let html = `<div class="item-reajuste"><div><strong>${prod.nome}</strong> <span style="color:#64748b;font-size:0.8rem;">${prod.categoria || ''}</span></div>`;

                if (prod.temVariacoes && prod.variacoes && prod.variacoes.length) {
                    html += `<div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">`;
                    prod.variacoes.forEach((v, idx) => {
                        html += `
                            <span style="display:flex; align-items:center; gap:4px; background:#f1f5f9; padding:4px 10px; border-radius:30px;">
                                <span>${v.nome}</span>
                                <input type="number" step="0.01" class="input-preco-edit" id="input-edit-var-${id}-${idx}" value="${v.preco.toFixed(2)}" style="width:70px;">
                                <button class="btn-update-preco" onclick="salvarPrecoVariacao('${id}', ${idx})"><i class="fas fa-check"></i></button>
                            </span>
                        `;
                    });
                    html += `</div>`;
                } else {
                    html += `
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span>R$</span>
                            <input type="number" step="0.01" class="input-preco-edit" id="input-edit-fixo-${id}" value="${prod.preco.toFixed(2)}">
                            <button class="btn-update-preco" onclick="salvarPrecoFixo('${id}')"><i class="fas fa-check"></i></button>
                        </div>
                    `;
                }
                html += `</div>`;
                container.innerHTML += html;
            });
        });
    }

    function salvarPrecoFixo(id) {
        const preco = parseFloat(document.getElementById(`input-edit-fixo-${id}`).value);
        if (isNaN(preco) || preco < 0) { alert("Preço inválido"); return; }
        db.collection("empresas").doc(idLojaAtual).collection("produtos").doc(id).update({ preco })
            .then(() => alert("✅ Preço atualizado."));
    }

    function salvarPrecoVariacao(id, index) {
        const novoValor = parseFloat(document.getElementById(`input-edit-var-${id}-${index}`).value);
        if (isNaN(novoValor) || novoValor < 0) { alert("Valor inválido"); return; }
        db.collection("empresas").doc(idLojaAtual).collection("produtos").doc(id).get()
            .then(doc => {
                const d = doc.data();
                if (!d.variacoes || !d.variacoes[index]) throw new Error("Variação não encontrada");
                d.variacoes[index].preco = novoValor;
                return db.collection("empresas").doc(idLojaAtual).collection("produtos").doc(id).update({ variacoes: d.variacoes });
            })
            .then(() => alert("✅ Variação atualizada."))
            .catch(err => alert("Erro: " + err.message));
    }

    function inicializarEscutadoresPedidos() {
        db.collection("empresas").doc(idLojaAtual).collection("pedidos").orderBy("dataCriacao", "desc").onSnapshot(snap => {
            const container = document.getElementById("lista-pedidos-admin");
            container.innerHTML = "";
            if (snap.empty) { container.innerHTML = "<p style='padding:20px;color:#64748b;'>Nenhum pedido no momento.</p>"; return; }

            snap.forEach(doc => {
                const ped = doc.data();
                let itensHTML = "";
                if (ped.itens && ped.itens.length) {
                    ped.itens.forEach(i => { itensHTML += `<div style="display:flex;gap:6px;"><span>•</span> ${i.quantidade}x ${i.nome}</div>`; });
                } else {
                    itensHTML = "<div style='color:#94a3b8;'>Itens não listados</div>";
                }

                const statusClass = (ped.status || "Pendente").replace(/\s/g, '-');
                container.innerHTML += `
                    <div class="pedido-card status-${statusClass}">
                        <div class="pedido-header">
                            <span><i class="fas fa-user-circle"></i> ${ped.clienteNome || 'Anônimo'} <span style="font-weight:400;font-size:0.8rem;color:#64748b;">${ped.tipoAtendimento || ''}</span></span>
                            <span style="font-weight:600;color:#0f172a;">R$ ${(ped.total || 0).toFixed(2)}</span>
                        </div>
                        <div style="font-size:0.8rem;color:#64748b;margin-top:4px;">
                            <i class="fas fa-map-pin"></i> ${ped.localizacao || '—'} 
                            <i class="fab fa-whatsapp" style="margin-left:12px;"></i> ${ped.clienteWhatsapp || 'Não informado'}
                        </div>
                        <div class="pedido-itens">${itensHTML}</div>
                        <select onchange="atualizarStatusComPontuacao('${doc.id}', this.value, '${ped.clienteWhatsapp || ''}')" style="margin-top:6px;">
                            <option value="Pendente" ${ped.status === 'Pendente' ? 'selected' : ''}>⏳ Pendente</option>
                            <option value="Em preparo" ${ped.status === 'Em preparo' ? 'selected' : ''}>👨‍🍳 Em preparo</option>
                            <option value="Em entrega" ${ped.status === 'Em entrega' ? 'selected' : ''}>🛵 Em entrega</option>
                            <option value="Concluido" ${ped.status === 'Concluido' ? 'selected' : ''}>✅ Concluído</option>
                        </select>
                    </div>
                `;
            });
        });
    }

    function atualizarStatusComPontuacao(idPedido, novoStatus, whatsappCliente) {
        db.collection('empresas').doc(idLojaAtual).collection('pedidos').doc(idPedido).update({ status: novoStatus })
            .then(() => {
                if (novoStatus === "Concluido" && whatsappCliente && whatsappCliente !== 'undefined' && whatsappCliente !== '') {
                    Promise.all([
                        db.collection('empresas').doc(idLojaAtual).collection('pedidos').doc(idPedido).get(),
                        db.collection('empresas').doc(idLojaAtual).get()
                    ]).then(([pedidoDoc, lojaDoc]) => {
                        const total = pedidoDoc.data().total || 0;
                        const valorPorPonto = lojaDoc.data().valorPorPonto || 10;
                        const pontos = Math.floor(total / valorPorPonto);
                        if (pontos > 0) {
                            const refCliente = db.collection("empresas").doc(idLojaAtual).collection("clientes").doc(whatsappCliente);
                            db.runTransaction((transaction) => {
                                return transaction.get(refCliente).then((clientDoc) => {
                                    if (!clientDoc.exists) {
                                        // cria cliente se não existir
                                        transaction.set(refCliente, { 
                                            nome: "Cliente", 
                                            whatsapp: whatsappCliente, 
                                            pontosFidelidade: pontos 
                                        });
                                    } else {
                                        const atuais = clientDoc.data().pontosFidelidade || 0;
                                        transaction.update(refCliente, { pontosFidelidade: atuais + pontos });
                                    }
                                });
                            }).then(() => {
                                // notificação sutil
                                const notif = document.createElement('div');
                                notif.style.cssText = 'position:fixed;bottom:20px;left:20px;background:#1e293b;color:white;padding:12px 24px;border-radius:40px;box-shadow:0 8px 20px rgba(0,0,0,0.2);z-index:999;';
                                notif.innerText = `✅ +${pontos} pontos para o cliente!`;
                                document.body.appendChild(notif);
                                setTimeout(() => notif.remove(), 3000);
                            });
                        }
                    });
                }
            });
    }

    function mudarAba(idAba, botao) {
        document.querySelectorAll('.aba-conteudo').forEach(aba => aba.classList.remove('ativa'));
        document.querySelectorAll('.aba-btn').forEach(btn => btn.classList.remove('ativa'));
        document.getElementById(idAba).classList.add('ativa');
        botao.classList.add('ativa');
    }
</script>

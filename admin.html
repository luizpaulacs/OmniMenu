<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Painel Admin · OmniMenu</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js">
    </script>

    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

    <!-- Font Awesome (ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ===================================================
                   RESET & BASE
                   =================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            line-height: 1.6;
            min-height: 100vh;
            padding: 0;
        }

        /* ===================================================
                   HEADER
                   =================================================== */
        .admin-header {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            color: #fff;
            padding: 20px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }

        .admin-header h1 i {
            color: #facc15;
            font-size: 1.4rem;
        }

        .admin-header .loja-nome {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .admin-header .loja-nome span {
            color: #fff;
            font-weight: 600;
        }

        /* ===================================================
                   CONTAINER PRINCIPAL
                   =================================================== */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* ===================================================
                   ABAS
                   =================================================== */
        .abas-menu {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: #fff;
            padding: 8px 12px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2e8f0;
        }

        .aba-btn {
            background: transparent;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            color: #64748b;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .aba-btn:hover {
            background: #f1f5f9;
            color: #0f172a;
        }

        .aba-btn.ativa {
            background: #0f172a;
            color: #fff;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.25);
        }

        .aba-btn i {
            font-size: 1rem;
        }

        /* ===================================================
                   CONTEÚDO DAS ABAS
                   =================================================== */
        .aba-conteudo {
            display: none;
            background: #fff;
            padding: 24px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2e8f0;
            animation: fadeIn 0.3s ease;
        }

        .aba-conteudo.ativa {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .aba-conteudo h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0f172a;
        }

        /* ===================================================
                   FILTROS (PEDIDOS)
                   =================================================== */
        .filtros-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filtro-btn {
            background: #f1f5f9;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            color: #475569;
            transition: 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filtro-btn:hover {
            background: #e2e8f0;
        }

        .filtro-btn.ativo {
            background: #0f172a;
            color: #fff;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
        }

        /* ===================================================
                   PEDIDO CARD
                   =================================================== */
        .pedido-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 14px;
            border-left: 6px solid #94a3b8;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
            border-left-width: 6px;
        }

        .pedido-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transform: translateY(-1px);
        }

        /* Cores por status */
        .pedido-card.status-Pendente {
            border-left-color: #f59e0b;
        }
        .pedido-card.status-Em\ preparo {
            border-left-color: #3b82f6;
        }
        .pedido-card.status-Em\ entrega {
            border-left-color: #f97316;
        }
        .pedido-card.status-Concluido {
            border-left-color: #22c55e;
            opacity: 0.75;
        }

        .pedido-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .pedido-header .cliente {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pedido-header .cliente .badge-tipo {
            font-weight: 500;
            font-size: 0.7rem;
            background: #e2e8f0;
            padding: 2px 12px;
            border-radius: 40px;
            color: #475569;
        }

        .pedido-header .total {
            font-weight: 700;
            color: #0f172a;
            font-size: 1.05rem;
        }

        .pedido-header .total i {
            color: #22c55e;
            margin-right: 4px;
        }

        .pedido-local {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pedido-itens {
            font-size: 0.85rem;
            color: #334155;
            padding: 10px 0;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 12px;
        }

        .pedido-itens .item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
        }

        .pedido-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .pedido-actions label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .select-status {
            padding: 8px 14px;
            border-radius: 40px;
            border: 1.5px solid #e2e8f0;
            font-weight: 600;
            font-size: 0.8rem;
            background: #fff;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        .select-status:focus {
            outline: none;
            border-color: #0f172a;
            box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.06);
        }

        /* ===================================================
                   RESUMO / DASHBOARD
                   =================================================== */
        .resumo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }

        .resumo-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px 18px;
            text-align: center;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .resumo-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .resumo-card .icon {
            font-size: 1.8rem;
            margin-bottom: 6px;
            display: block;
        }

        .resumo-card h3 {
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .resumo-card .valor {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0f172a;
            margin-top: 4px;
        }

        .resumo-card .sub {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 2px;
        }

        /* Cores dos cards de resumo */
        .resumo-card.faturamento .icon {
            color: #22c55e;
        }
        .resumo-card.pedidos .icon {
            color: #3b82f6;
        }
        .resumo-card.canais .icon {
            color: #f59e0b;
        }

        /* ===================================================
                   FORMULÁRIO DE CADASTRO
                   =================================================== */
        #form-produto {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .campo label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .campo label i {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .campo input,
        .campo textarea,
        .campo select {
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            background: #fafcff;
            transition: 0.2s;
            width: 100%;
        }

        .campo input:focus,
        .campo textarea:focus,
        .campo select:focus {
            outline: none;
            border-color: #0f172a;
            box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.06);
            background: #fff;
        }

        .campo textarea {
            resize: vertical;
            min-height: 80px;
        }

        .campo input[type="file"] {
            padding: 10px;
            background: #f8fafc;
            border-style: dashed;
            cursor: pointer;
        }

        .campo input[type="file"]:hover {
            background: #f1f5f9;
        }

        .btn-salvar {
            background: #0f172a;
            color: #fff;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            margin-top: 4px;
        }

        .btn-salvar:hover {
            background: #1e293b;
            transform: scale(1.01);
        }

        .btn-salvar:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .btn-salvar i {
            font-size: 1.1rem;
        }

        /* ===================================================
                   MENSAGEM DE LISTA VAZIA
                   =================================================== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
            color: #cbd5e1;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* ===================================================
                   RESPONSIVO
                   =================================================== */
        @media (max-width: 640px) {
            .admin-header {
                padding: 16px;
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .admin-header h1 {
                justify-content: center;
                font-size: 1rem;
            }

            .admin-header .loja-nome {
                text-align: center;
                font-size: 0.8rem;
            }

            .main-container {
                padding: 12px 12px 30px;
            }

            .abas-menu {
                padding: 6px 8px;
                gap: 4px;
                justify-content: center;
            }

            .aba-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }

            .aba-btn span {
                display: none;
            }

            .aba-btn i {
                font-size: 1.1rem;
            }

            .aba-conteudo {
                padding: 16px 14px;
                border-radius: 16px;
            }

            .aba-conteudo h2 {
                font-size: 1.05rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .pedido-card {
                padding: 14px 16px;
            }

            .pedido-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .pedido-header .total {
                font-size: 0.95rem;
            }

            .pedido-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .select-status {
                width: 100%;
            }

            .resumo-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .resumo-card .valor {
                font-size: 1.4rem;
            }

            .filtros-container {
                gap: 4px;
            }

            .filtro-btn {
                font-size: 0.7rem;
                padding: 6px 12px;
            }
        }

        @media (max-width: 400px) {
            .resumo-grid {
                grid-template-columns: 1fr;
            }

            .aba-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
            }
        }

        @media (min-width: 768px) {
            .admin-header h1 {
                font-size: 1.5rem;
            }

            .pedido-card {
                padding: 20px 24px;
            }

            .aba-conteudo {
                padding: 32px 28px;
            }
        }

        /* ===================================================
                   UTILITÁRIOS
                   =================================================== */
        .text-muted {
            color: #94a3b8;
        }

        .mt-2 {
            margin-top: 12px;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- ====================================================
    HEADER ADMIN
    ==================================================== -->
    <header class="admin-header">
        <h1>
            <i class="fas fa-cog"></i>
            OmniMenu Admin
        </h1>
        <div class="loja-nome">
            <i class="fas fa-store"></i>
            <span id="txt-nome-loja">Carregando...</span>
        </div>
    </header>

    <!-- ====================================================
    CONTEÚDO PRINCIPAL
    ==================================================== -->
    <div class="main-container" id="conteudo-painel-admin">

        <!-- Abas -->
        <nav class="abas-menu">
            <button class="aba-btn ativa" onclick="mudarAba('aba-pedidos', this)">
                <i class="fas fa-inbox"></i> <span>Pedidos</span>
            </button>
            <button class="aba-btn" onclick="mudarAba('aba-resumo', this)">
                <i class="fas fa-chart-simple"></i> <span>Resumo</span>
            </button>
            <button class="aba-btn" onclick="mudarAba('aba-cadastro', this)">
                <i class="fas fa-plus-circle"></i> <span>Produto</span>
            </button>
        </nav>

        <!-- ABA 1: PEDIDOS -->
        <div id="aba-pedidos" class="aba-conteudo ativa">
            <h2><i class="fas fa-list-ul" style="color:#3b82f6;"></i> Pedidos em Tempo Real</h2>

            <div class="filtros-container">
                <button class="filtro-btn ativo" onclick="filtrarPedidos('Todos', this)">
                    <i class="fas fa-th-list"></i> Todos
                </button>
                <button class="filtro-btn" onclick="filtrarPedidos('Pendente', this)">
                    <i class="fas fa-clock"></i> Pendentes
                </button>
                <button class="filtro-btn" onclick="filtrarPedidos('Em preparo', this)">
                    <i class="fas fa-utensils"></i> Cozinha
                </button>
                <button class="filtro-btn" onclick="filtrarPedidos('Em entrega', this)">
                    <i class="fas fa-truck"></i> Entrega
                </button>
                <button class="filtro-btn" onclick="filtrarPedidos('Concluido', this)">
                    <i class="fas fa-check-circle"></i> Concluídos
                </button>
            </div>

            <div id="lista-pedidos-admin">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Carregando pedidos...</p>
                </div>
            </div>
        </div>

        <!-- ABA 2: RESUMO -->
        <div id="aba-resumo" class="aba-conteudo">
            <h2><i class="fas fa-chart-pie" style="color:#f59e0b;"></i> Estatísticas do Dia</h2>
            <div class="resumo-grid">
                <div class="resumo-card faturamento">
                    <span class="icon">💰</span>
                    <h3>Faturamento</h3>
                    <div class="valor" id="resumo-faturamento">R$ 0,00</div>
                </div>
                <div class="resumo-card pedidos">
                    <span class="icon">📦</span>
                    <h3>Total Pedidos</h3>
                    <div class="valor" id="resumo-total-pedidos">0</div>
                </div>
                <div class="resumo-card canais">
                    <span class="icon">📊</span>
                    <h3>Delivery · Mesa</h3>
                    <div class="valor" id="resumo-canais">0 · 0</div>
                    <div class="sub">entregas · mesa</div>
                </div>
            </div>
        </div>

        <!-- ABA 3: CADASTRO DE PRODUTO -->
        <div id="aba-cadastro" class="aba-conteudo">
            <h2><i class="fas fa-utensils" style="color:#22c55e;"></i> Novo Item no Cardápio</h2>

            <form id="form-produto" onsubmit="cadastrarProduto(event)">
                <div class="form-row">
                    <div class="campo">
                        <label><i class="fas fa-tag"></i> Nome do Produto</label>
                        <input type="text" id="prod-nome" placeholder="Ex: Pizza Frango c/ Catupiry" required />
                    </div>
                    <div class="campo">
                        <label><i class="fas fa-dollar-sign"></i> Preço (R$)</label>
                        <input type="number" id="prod-preco" step="0.01" placeholder="49,90" required />
                    </div>
                </div>

                <div class="campo">
                    <label><i class="fas fa-align-left"></i> Descrição / Ingredientes</label>
                    <textarea id="prod-desc" rows="3" placeholder="Descreva os ingredientes e diferenciais..." required></textarea>
                </div>

                <div class="campo">
                    <label><i class="fas fa-image"></i> Imagem do Produto</label>
                    <input type="file" id="prod-img" accept="image/*" required />
                </div>

                <button type="submit" id="btn-submit-admin" class="btn-salvar">
                    <i class="fas fa-cloud-upload-alt"></i> Salvar Produto
                </button>
            </form>
        </div>

    </div>

    <!-- ====================================================
    JAVASCRIPT — FIREBASE + LÓGICA
    ==================================================== -->
    <script>
        // ------------------------------------------------------------
        // CONFIGURAÇÃO FIREBASE
        // ------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyAC3ep1kk4zxKkVH1jXHqWV9r2use_HWfo",
            authDomain: "omnimenu-d2875.firebaseapp.com",
            projectId: "omnimenu-d2875",
            storageBucket: "omnimenu-d2875.firebasestorage.app",
            messagingSenderId: "628204265903",
            appId: "1:628204265903:web:379db009ca38289bd6cf5a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ------------------------------------------------------------
        // PARÂMETROS DA URL
        // ------------------------------------------------------------
        const urlParams = new URLSearchParams(window.location.search);
        const idLojaAtual = urlParams.get('loja');

        if (!idLojaAtual) {
            document.getElementById('conteudo-painel-admin').innerHTML = `
                    <div class="empty-state" style="padding:60px 20px;">
                        <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                        <p><strong>Link inválido</strong><br>Identificador da loja ausente.</p>
                    </div>
                `;
            throw new Error('ID da loja ausente na URL');
        }

        // ------------------------------------------------------------
        // ESTADO GLOBAL
        // ------------------------------------------------------------
        let todosPedidosLocais = [];
        let filtroAtual = 'Todos';
        let unsubscribePedidos = null;

        // ------------------------------------------------------------
        // REFERÊNCIAS DOM
        // ------------------------------------------------------------
        const listaPedidosEl = document.getElementById('lista-pedidos-admin');

        // ------------------------------------------------------------
        // 1. VERIFICAR LOJA E VALIDAR LICENÇA
        // ------------------------------------------------------------
        db.collection('empresas')
            .doc(idLojaAtual)
            .get()
            .then((doc) => {
                if (!doc.exists) {
                    document.getElementById('conteudo-painel-admin').innerHTML = `
                            <div class="empty-state" style="padding:60px 20px;">
                                <i class="fas fa-store-slash" style="color:#ef4444;"></i>
                                <p><strong>Estabelecimento não encontrado</strong></p>
                            </div>
                        `;
                    return;
                }

                const dadosLoja = doc.data();

                // 🔒 BLOQUEIO POR MENSALIDADE
                if (dadosLoja.status === 'Bloqueado') {
                    document.getElementById('conteudo-painel-admin').innerHTML = `
                            <div class="empty-state" style="padding:60px 20px;">
                                <i class="fas fa-lock" style="color:#ef4444; font-size:3rem;"></i>
                                <p><strong>Acesso suspenso</strong><br>
                                <span style="color:#64748b; font-size:0.9rem;">
                                    Licença OmniMenu pendente. Contate a Akagai Pora.
                                </span></p>
                            </div>
                        `;
                    return;
                }

                document.getElementById('txt-nome-loja').textContent = dadosLoja.nomeNegocio || 'Estabelecimento';
                inicializarEscutadores();
            })
            .catch((err) => {
                console.error('Erro ao carregar loja:', err);
                listaPedidosEl.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-circle" style="color:#ef4444;"></i>
                            <p>Erro ao conectar ao servidor.</p>
                        </div>
                    `;
            });

        // ------------------------------------------------------------
        // 2. INICIAR ESCUTADORES (REALTIME)
        // ------------------------------------------------------------
        function inicializarEscutadores() {
            if (unsubscribePedidos) unsubscribePedidos();

            unsubscribePedidos = db
                .collection('empresas')
                .doc(idLojaAtual)
                .collection('pedidos')
                .orderBy('dataCriacao', 'desc')
                .onSnapshot((snapshot) => {
                    todosPedidosLocais = [];
                    snapshot.forEach((doc) => {
                        const p = doc.data();
                        p.id = doc.id;
                        todosPedidosLocais.push(p);
                    });
                    renderizarPedidos();
                    calcularResumoDoDia();
                }, (error) => {
                    console.error('Erro no snapshot:', error);
                    listaPedidosEl.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-exclamation-circle" style="color:#ef4444;"></i>
                                <p>Erro ao carregar pedidos em tempo real.</p>
                            </div>
                        `;
                });
        }

        // ------------------------------------------------------------
        // 3. RENDERIZAR PEDIDOS
        // ------------------------------------------------------------
        function renderizarPedidos() {
            const pedidosFiltrados = todosPedidosLocais.filter((p) => {
                if (filtroAtual === 'Todos') return true;
                return p.status === filtroAtual;
            });

            if (pedidosFiltrados.length === 0) {
                listaPedidosEl.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>Nenhum pedido ${filtroAtual === 'Todos' ? '' : 'com status "' + filtroAtual + '"'}.</p>
                        </div>
                    `;
                return;
            }

            let html = '';
            pedidosFiltrados.forEach((pedido) => {
                let itensHtml = '';
                pedido.itens.forEach((item) => {
                    itensHtml += `
                            <div class="item">
                                <span>${item.quantidade}x ${item.nome}</span>
                                <span>R$ ${(item.precoUnitario * item.quantidade).toFixed(2)}</span>
                            </div>
                        `;
                });

                // Ícone do tipo de atendimento
                let tipoIcon = '';
                if (pedido.tipoAtendimento === 'Entrega') tipoIcon = '🛵';
                else if (pedido.tipoAtendimento === 'Mesa') tipoIcon = '🍽️';
                else tipoIcon = '🏪';

                html += `
                        <div class="pedido-card status-${pedido.status}">
                            <div class="pedido-header">
                                <div class="cliente">
                                    <i class="fas fa-user-circle"></i>
                                    ${pedido.clienteNome}
                                    <span class="badge-tipo">${tipoIcon} ${pedido.tipoAtendimento}</span>
                                </div>
                                <div class="total">
                                    <i class="fas fa-coin"></i> R$ ${pedido.total.toFixed(2)}
                                </div>
                            </div>
                            <div class="pedido-local">
                                <i class="fas fa-location-dot"></i>
                                ${pedido.localizacao || 'Não informado'}
                            </div>
                            <div class="pedido-itens">${itensHtml}</div>
                            <div class="pedido-actions">
                                <label for="status-${pedido.id}"><i class="fas fa-rotate"></i> Status</label>
                                <select class="select-status" id="status-${pedido.id}" 
                                        onchange="atualizarStatusPedido('${pedido.id}', this.value)">
                                    <option value="Pendente" ${pedido.status === 'Pendente' ? 'selected' : ''}>
                                        ⏳ Pendente
                                    </option>
                                    <option value="Em preparo" ${pedido.status === 'Em preparo' ? 'selected' : ''}>
                                        👨‍🍳 Em preparo
                                    </option>
                                    <option value="Em entrega" ${pedido.status === 'Em entrega' ? 'selected' : ''}>
                                        🛵 Em entrega
                                    </option>
                                    <option value="Concluido" ${pedido.status === 'Concluido' ? 'selected' : ''}>
                                        ✅ Concluído
                                    </option>
                                </select>
                            </div>
                        </div>
                    `;
            });

            listaPedidosEl.innerHTML = html;
        }

        // ------------------------------------------------------------
        // 4. FILTRAR PEDIDOS
        // ------------------------------------------------------------
        function filtrarPedidos(status, botao) {
            filtroAtual = status;
            document.querySelectorAll('.filtro-btn').forEach((btn) => btn.classList.remove('ativo'));
            botao.classList.add('ativo');
            renderizarPedidos();
        }

        // ------------------------------------------------------------
        // 5. ATUALIZAR STATUS
        // ------------------------------------------------------------
        function atualizarStatusPedido(id, novoStatus) {
            db.collection('empresas')
                .doc(idLojaAtual)
                .collection('pedidos')
                .doc(id)
                .update({ status: novoStatus })
                .catch((err) => {
                    console.error('Erro ao atualizar status:', err);
                    alert('Erro ao atualizar status. Tente novamente.');
                });
        }

        // ------------------------------------------------------------
        // 6. CALCULAR RESUMO DO DIA
        // ------------------------------------------------------------
        function calcularResumoDoDia() {
            let faturamento = 0;
            let delivery = 0;
            let mesa = 0;

            todosPedidosLocais.forEach((p) => {
                faturamento += p.total || 0;
                if (p.tipoAtendimento === 'Entrega') delivery++;
                if (p.tipoAtendimento === 'Mesa') mesa++;
            });

            document.getElementById('resumo-faturamento').textContent =
                `R$ ${faturamento.toFixed(2)}`;
            document.getElementById('resumo-total-pedidos').textContent =
                todosPedidosLocais.length;
            document.getElementById('resumo-canais').textContent =
                `${delivery} · ${mesa}`;
        }

        // ------------------------------------------------------------
        // 7. MUDAR ABA
        // ------------------------------------------------------------
        function mudarAba(idAba, botao) {
            document.querySelectorAll('.aba-conteudo').forEach((aba) => aba.classList.remove('ativa'));
            document.querySelectorAll('.aba-btn').forEach((btn) => btn.classList.remove('ativa'));

            document.getElementById(idAba).classList.add('ativa');
            botao.classList.add('ativa');
        }

        // ------------------------------------------------------------
        // 8. CADASTRAR PRODUTO
        // ------------------------------------------------------------
        function cadastrarProduto(event) {
            event.preventDefault();

            const btn = document.getElementById('btn-submit-admin');
            const arquivo = document.getElementById('prod-img').files[0];
            const nome = document.getElementById('prod-nome').value.trim();
            const desc = document.getElementById('prod-desc').value.trim();
            const preco = parseFloat(document.getElementById('prod-preco').value);

            if (!arquivo) {
                alert('Selecione uma imagem para o produto.');
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
            btn.disabled = true;

            const nomeArquivo = Date.now() + '_' + arquivo.name;
            const refStorage = storage.ref().child('produtos/' + nomeArquivo);

            refStorage
                .put(arquivo)
                .then((snapshot) => snapshot.ref.getDownloadURL())
                .then((urlImagem) => {
                    return db
                        .collection('empresas')
                        .doc(idLojaAtual)
                        .collection('produtos')
                        .add({
                            nome: nome,
                            desc: desc,
                            preco: preco,
                            imagemUrl: urlImagem,
                            dataCriacao: firebase.firestore.FieldValue.serverTimestamp()
                        });
                })
                .then(() => {
                    alert('✅ Produto cadastrado com sucesso!');
                    document.getElementById('form-produto').reset();
                })
                .catch((error) => {
                    console.error('Erro ao cadastrar:', error);
                    alert('❌ Erro ao cadastrar produto: ' + error.message);
                })
                .finally(() => {
                    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Salvar Produto';
                    btn.disabled = false;
                });
        }
    </script>

</body>
</html>

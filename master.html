<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Akagai Pora</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #0f172a; color: #cbd5e1; display: none; }
        h1, h2 { color: #f8fafc; margin-top: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 2.5fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 992px) { .grid { grid-template-columns: 1fr; } }
        
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .campo { margin-bottom: 15px; }
        .campo label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #94a3b8; }
        .campo input { width: 100%; padding: 10px; border: 1px solid #334155; background: #0f172a; color: white; border-radius: 6px; box-sizing: border-box; }
        
        .btn { background: #22c55e; color: #000; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; }
        .btn:hover { background: #16a34a; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #1e293b; }
        th { background: #334155; color: #22c55e; text-align: left; padding: 12px; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 14px; vertical-align: top; }
        
        /* Estilos dos Links Gerados */
        .link-box { background: #0f172a; border: 1px solid #334155; padding: 6px 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; margin-top: 5px; max-width: 450px; }
        .link-text { color: #38bdf8; font-family: monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 350px; }
        .btn-copiar { background: #475569; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-copiar:hover { background: #64748b; }
        
        .status-badge-ativo { background: #16a34a; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; }
        .status-badge-bloqueado { background: #dc2626; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; }
        .action-btn { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-top: 5px; width: 100%; display: block; text-align: center; }
        .btn-bloquear { background: #ef4444; color: white; }
        .btn-ativar { background: #22c55e; color: black; }
    </style>
</head>
<body>

    <div class="container">
        <header style="border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 20px;">
            <h1>🛡️ Painel Master SaaS — Akagai Pora</h1>
            <p style="color: #94a3b8; margin: 0;">Controle Global de Licenças e Links Gerados</p>
        </header>

        <div class="grid">
            <div class="card" style="height: fit-content;">
                <h2>🏢 Nova Empresa</h2>
                <form id="form-empresa" onsubmit="criarEmpresa(event)">
                    <div class="campo">
                        <label>ID Único da URL (ex: lanchesartesanal):</label>
                        <input type="text" id="emp-id" placeholder="Apenas letras minusculas, sem espaços" required>
                    </div>
                    <div class="campo">
                        <label>Nome da Lanchonete / Empresa:</label>
                        <input type="text" id="emp-nome" placeholder="Ex: Burger Gourmet" required>
                    </div>
                    <div class="campo">
                        <label>Cor Principal (Hexadecimal):</label>
                        <input type="text" id="emp-cor" placeholder="Ex: #e74c3c" value="#e74c3c" required>
                    </div>
                    <div class="campo">
                        <label>WhatsApp de Pedidos:</label>
                        <input type="text" id="emp-whatsapp" placeholder="Ex: 5511999999999" required>
                    </div>
                    <button type="submit" class="btn">⚡ Ativar e Criar Sistema</button>
                </form>
            </div>

            <div class="card">
                <h2>👥 Lojistas Cadastrados</h2>
                <table id="tabela-lojistas">
                    <thead>
                        <tr>
                            <th style="width: 50%;">Empresa e URLs de Acesso</th>
                            <th>WhatsApp</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-lojistas-master">
                        <tr><td colspan="4" style="color:#94a3b8;">Carregando clientes...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // =============================================================
        // TRAVA DE SEGURANÇA POR SENHA MESTRA
        // =============================================================
        const SENHA_MESTRA = "akagai1741"; // 🌟 COLOQUE SUA SENHA DO PAINEL AQUI
        
        const tentativaSenha = prompt("Acesso Restrito - Akagai Pora.\nDigite a senha master do OmniMenu:");
        
        if (tentativaSenha === SENHA_MESTRA) {
            document.body.style.display = "block";
        } else {
            alert("❌ Senha incorreta! Acesso negado.");
            window.location.href = "https://github.com";
            throw new Error("Acesso bloqueado por senha inválida.");
        }

        // =============================================================
        // LINK BASE DO SEU GITHUB PAGES
        // =============================================================
        const URL_BASE_GITHUB = "https://luizpaulacs.github.io/OmniMenu/";

        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAC3ep1kk4zxKkVH1jXHqWV9r2use_HWfo",
            authDomain: "omnimenu-d2875.firebaseapp.com",
            projectId: "omnimenu-d2875",
            storageBucket: "omnimenu-d2875.firebasestorage.app",
            messagingSenderId: "628204265903",
            appId: "1:628204265903:web:379db009ca38289bd6cf5a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function criarEmpresa(event) {
            event.preventDefault();
            const idLoja = document.getElementById('emp-id').value.trim().toLowerCase();
            const nome = document.getElementById('emp-nome').value;
            const cor = document.getElementById('emp-cor').value;
            const whatsapp = document.getElementById('emp-whatsapp').value;

            db.collection("empresas").doc(idLoja).set({
                nomeNegocio: nome,
                corPrincipal: cor,
                whatsapp: whatsapp,
                status: "Ativo",
                dataContrato: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert(`Sistema da loja '${nome}' criado com sucesso!`);
                document.getElementById('form-empresa').reset();
            })
            .catch(error => alert("Erro ao criar empresa: " + error.message));
        }

        // ESCUTA E GERA OS LINKS DINAMICAMENTE NA TABELA
        db.collection("empresas").onSnapshot((snapshot) => {
            const tbody = document.getElementById("lista-lojistas-master");
            tbody.innerHTML = "";

            if(snapshot.empty) {
                tbody.innerHTML = "<tr><td colspan='4'>Nenhuma lanchonete cadastrada ainda.</td></tr>";
                return;
            }

            snapshot.forEach((doc) => {
                const empresa = doc.data();
                const id = doc.id;
                
                // Monta os links completos automaticamente com base no ID
                const linkCliente = `${URL_BASE_GITHUB}index.html?loja=${id}`;
                const linkAdmin = `${URL_BASE_GITHUB}admin.html?loja=${id}`;

                const badgeStatus = empresa.status === "Ativo" 
                    ? `<span class="status-badge-ativo">Ativo</span>` 
                    : `<span class="status-badge-bloqueado">Inadimplente</span>`;

                const botaoAcao = empresa.status === "Ativo"
                    ? `<button class="action-btn btn-bloquear" onclick="alterarStatusLicenca('${id}', 'Bloqueado')">🚫 Bloquear</button>`
                    : `<button class="action-btn btn-ativar" onclick="alterarStatusLicenca('${id}', 'Ativo')">✅ Reativar</button>`;

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <strong style="font-size: 16px; color: #fff;">${empresa.nomeNegocio}</strong> <small style="color:#64748b;">(${id})</small>
                            
                            <div style="margin-top: 10px;">
                                <span style="font-size: 11px; color: #94a3b8; font-weight: bold;">📱 CARDÁPIO DO CLIENTE:</span>
                                <div class="link-box">
                                    <span class="link-text" id="url-cli-${id}">${linkCliente}</span>
                                    <button class="btn-copiar" onclick="copiarTexto('${linkCliente}')">Copiar</button>
                                </div>
                            </div>
                            
                            <div style="margin-top: 8px;">
                                <span style="font-size: 11px; color: #94a3b8; font-weight: bold;">⚙️ PAINEL DO LOJISTA (ADMIN):</span>
                                <div class="link-box">
                                    <span class="link-text" id="url-adm-${id}">${linkAdmin}</span>
                                    <button class="btn-copiar" onclick="copiarTexto('${linkAdmin}')">Copiar</button>
                                </div>
                            </div>
                        </td>
                        <td>${empresa.whatsapp}</td>
                        <td>${badgeStatus}</td>
                        <td>${botaoAcao}</td>
                    </tr>
                `;
            });
        });

        // FUNÇÃO AUXILIAR PARA COPIAR O LINK COM UM CLIQUE
        function copiarTexto(texto) {
            navigator.clipboard.writeText(texto).then(() => {
                alert("Link copiado para a área de transferência!");
            }).catch(err => {
                alert("Erro ao copiar o link, faça manualmente.");
            });
        }

        function alterarStatusLicenca(idEmpresa, novoStatus) {
            const msgConfirmacao = novoStatus === "Bloqueado" 
                ? "Tem certeza que deseja BLOQUEAR o acesso deste cliente?" 
                : "Confirmar ativação/pagamento deste cliente?";
                
            if(confirm(msgConfirmacao)) {
                db.collection("empresas").doc(idEmpresa).update({
                    status: novoStatus
                })
                .catch(err => alert("Erro ao mudar licença: " + err.message));
            }
        }
    </script>
</body>
</html>

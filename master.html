<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Akagai Pora</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #0f172a; color: #cbd5e1; }
        h1, h2 { color: #f8fafc; }
        .container { max-width: 1100px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .campo { margin-bottom: 15px; }
        .campo label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #94a3b8; }
        .campo input { width: 100%; padding: 10px; border: 1px solid #334155; background: #0f172a; color: white; border-radius: 6px; box-sizing: border-box; }
        
        .btn { background: #22c55e; color: #000; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; }
        .btn:hover { background: #16a34a; }
        
        /* Tabela de Lojistas */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #1e293b; }
        th { background: #334155; color: #22c55e; text-align: left; padding: 12px; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 15px; }
        
        .status-badge-ativo { background: #16a34a; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-badge-bloqueado { background: #dc2626; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .action-btn { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-right: 5px; }
        .btn-bloquear { background: #ef4444; color: white; }
        .btn-ativar { background: #22c55e; color: black; }
    </style>
</head>
<body>

    <div class="container">
        <header style="border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 20px;">
            <h1>🛡️ Painel Master SaaS — Akagai Pora</h1>
            <p style="color: #94a3b8; margin: 0;">Controle Global de Licenças e Ativações do OmniMenu</p>
        </header>

        <div class="grid">
            <div class="card">
                <h2>🏢 Nova Empresa</h2>
                <form id="form-empresa" onsubmit="criarEmpresa(event)">
                    <div class="campo">
                        <label>ID Único da URL (ex: lanchesartesanal):</label>
                        <input type="text" id="emp-id" placeholder="Apenas letras, sem espaços" required>
                    </div>
                    <div class="campo">
                        <label>Nome da Lanchonete / Empresa:</label>
                        <input type="text" id="emp-nome" placeholder="Ex: Burger Gourmet" required>
                    </div>
                    <div class="campo">
                        <label>Cor Principal (Hexadecimal):</label>
                        <input type="text" id="emp-cor" placeholder="Ex: #e74c3c" value="#e74c3c" required>
                    </div>
                    <div class="campo">
                        <label>WhatsApp de Pedidos:</label>
                        <input type="text" id="emp-whatsapp" placeholder="Ex: 5511999999999" required>
                    </div>
                    <button type="submit" class="btn">⚡ Ativar e Criar Sistema</button>
                </form>
            </div>

            <div class="card">
                <h2>👥 Lojistas Cadastrados</h2>
                <table id="tabela-lojistas">
                    <thead>
                        <tr>
                            <th>Empresa (ID)</th>
                            <th>WhatsApp</th>
                            <th>Status</th>
                            <th>Ações de Licença</th>
                        </tr>
                    </thead>
                    <tbody id="lista-lojistas-master">
                        <tr><td colspan="4" style="color:#94a3b8;">Carregando clientes...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU FIREBASE (Insira suas chaves aqui)
        const firebaseConfig = {
            apiKey: "AIzaSyAC3ep1kk4zxKkVH1jXHqWV9r2use_HWfo",
            authDomain: "omnimenu-d2875.firebaseapp.com",
            projectId: "omnimenu-d2875",
            storageBucket: "omnimenu-d2875.firebasestorage.app",
            messagingSenderId: "628204265903",
            appId: "1:628204265903:web:379db009ca38289bd6cf5a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. CRIAÇÃO DE NOVA EMPRESA COM STATUS ATIVO POR PADRÃO
        function criarEmpresa(event) {
            event.preventDefault();
            
            // Força o ID a ficar em letras minúsculas e sem espaços vazios
            const idLoja = document.getElementById('emp-id').value.trim().toLowerCase();
            const nome = document.getElementById('emp-nome').value;
            const cor = document.getElementById('emp-cor').value;
            const whatsapp = document.getElementById('emp-whatsapp').value;

            db.collection("empresas").doc(idLoja).set({
                nomeNegocio: nome,
                corPrincipal: cor,
                whatsapp: whatsapp,
                status: "Ativo", // Nasce ativo
                dataContrato: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert(`Sistema da loja '${nome}' criado com sucesso!`);
                document.getElementById('form-empresa').reset();
            })
            .catch(error => alert("Erro ao criar empresa: " + error.message));
        }

        // 2. ESCUTA TODAS AS EMPRESAS DO BANCO EM TEMPO REAL
        db.collection("empresas").onSnapshot((snapshot) => {
            const tbody = document.getElementById("lista-lojistas-master");
            tbody.innerHTML = "";

            if(snapshot.empty) {
                tbody.innerHTML = "<tr><td colspan='4'>Nenhuma lanchonete cadastrada ainda.</td></tr>";
                return;
            }

            snapshot.forEach((doc) => {
                const empresa = doc.data();
                const id = doc.id;
                
                const badgeStatus = empresa.status === "Ativo" 
                    ? `<span class="status-badge-ativo">Ativo</span>` 
                    : `<span class="status-badge-bloqueado">Inadimplente</span>`;

                const botaoAcao = empresa.status === "Ativo"
                    ? `<button class="action-btn btn-bloquear" onclick="alterarStatusLicenca('${id}', 'Bloqueado')">🚫 Bloquear</button>`
                    : `<button class="action-btn btn-ativar" onclick="alterarStatusLicenca('${id}', 'Ativo')">✅ Ativar / Pago</button>`;

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${empresa.nomeNegocio}</strong><br><small style="color:#64748b;">?loja=${id}</small></td>
                        <td>${empresa.whatsapp}</td>
                        <td>${badgeStatus}</td>
                        <td>${botaoAcao}</td>
                    </tr>
                `;
            });
        });

        // 3. ALTERA O STATUS DO CLIENTE SEM ENTRAR NO FIREBASE MANUALLY
        function alterarStatusLicenca(idEmpresa, novoStatus) {
            const msgConfirmacao = novoStatus === "Bloqueado" 
                ? "Tem certeza que deseja BLOQUEAR o acesso deste cliente por falta de pagamento?" 
                : "Confirmar ativação/pagamento da mensalidade deste cliente?";
                
            if(confirm(msgConfirmacao)) {
                db.collection("empresas").doc(idEmpresa).update({
                    status: novoStatus
                })
                .then(() => console.log(`Licença de ${idEmpresa} atualizada para ${novoStatus}.`))
                .catch(err => alert("Erro ao mudar licença: " + err.message));
            }
        }
    </script>
</body>
</html>
